name: Publish NuGet packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version (e.g. 0.5.0)
        required: false
        type: string

jobs:
  build-test-pack-publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            echo "Unable to resolve version from tag or input."
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "❌ Invalid version: '$VERSION'"; exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing version: $VERSION"

      - name: Restore
        run: dotnet restore ElBruno.Speech.sln

      - name: Build
        run: >
          dotnet build ElBruno.Speech.sln
          --configuration Release
          --no-restore
          /p:Version=${{ steps.version.outputs.value }}

      - name: Test
        run: >
          dotnet test ElBruno.Speech.sln
          --configuration Release
          --no-build
          --filter "Category!=Integration&Category!=ModelDownload&Category!=Gpu&Category!=WebSocket&Category!=LongRunning"

      - name: Pack
        run: >
          dotnet pack ElBruno.Speech.sln
          --configuration Release
          --no-build
          /p:Version=${{ steps.version.outputs.value }}
          --output ./artifacts/packages

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./artifacts/packages/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/packages/*.nupkg

