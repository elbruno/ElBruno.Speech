name: Publish NuGet packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Optional package version (e.g. 0.1.0-preview.1)
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build-test-pack-publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [ -z "$VERSION" ]; then
            echo "Unable to resolve version from tag or input."
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Restore
        run: dotnet restore ElBruno.Speech.sln

      - name: Build
        run: >
          dotnet build ElBruno.Speech.sln
          --configuration Release
          --no-restore
          /p:Version=${{ steps.version.outputs.value }}

      - name: Test
        run: >
          dotnet test ElBruno.Speech.sln
          --configuration Release
          --no-build
          --filter "Category!=Integration&Category!=ModelDownload&Category!=Gpu&Category!=WebSocket&Category!=LongRunning"

      - name: Pack
        run: >
          dotnet pack ElBruno.Speech.sln
          --configuration Release
          --no-build
          /p:Version=${{ steps.version.outputs.value }}
          --output ./artifacts/packages

      - name: Publish to NuGet.org (Trusted Publishing)
        env:
          NUGET_USER: ${{ vars.NUGET_USER }}
        run: |
          # Exchange GitHub OIDC token for a scoped NuGet API key
          OIDC_TOKEN=$(curl -sSfL \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org" \
            | jq -r '.value')

          NUGET_KEY=$(curl -sSf \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"Token\":\"${OIDC_TOKEN}\"}" \
            "https://www.nuget.org/packages/publish" \
            | jq -r '.apiKey // empty')

          if [ -z "$NUGET_KEY" ]; then
            echo "::error::Failed to exchange OIDC token for NuGet API key."
            echo "Ensure '$NUGET_USER' has configured GitHub Actions as a Trusted Publisher on nuget.org."
            echo "Visit: https://www.nuget.org/account/manage/packages"
            exit 1
          fi

          echo "::add-mask::$NUGET_KEY"

          dotnet nuget push ./artifacts/packages/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_KEY" \
            --skip-duplicate
